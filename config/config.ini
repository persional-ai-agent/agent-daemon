; agent-daemon configuration
; Precedence: environment variables > config.ini > built-in defaults

[api]
; API type: openai, anthropic, codex
type = openai
; Base URL for the API
base_url = http://127.0.0.1:9999/v1
; API key (use environment variable for security)
api_key = "sk-local"
; Default model
model = gpt-4o-mini
; Enable streaming
streaming = true

[api.codex]
; Codex-specific overrides (falls back to [api] values)
; base_url = https://api.openai.com/v1
; api_key =
; model = gpt-5-codex

[api.anthropic]
; Anthropic-specific overrides
; base_url = https://api.anthropic.com/v1
; api_key =
; model = claude-3-5-haiku-latest

[provider]
; Fallback provider (empty = disabled)
; fallback = anthropic
; Cascade providers (comma-separated, with optional :cost)
; cascade = openai:1.0,anthropic:2.5
; Parallel race mode
race_enabled = false
; Cost-aware routing
cost_aware = false
; Circuit breaker settings
; circuit_failure_threshold = 3
; circuit_recovery_seconds = 60
; circuit_half_open_max_requests = 1

[agent]
; Directory for data storage
; data_dir = ~/.agent-daemon
; HTTP listen address
; listen_addr = :8080
; Working directory
; workdir =
; Max iterations per run
; max_iterations = 30
; Context compression settings
; max_context_chars = 120000
; compression_tail_messages = 14
; Approval TTL in seconds
; approval_ttl_seconds = 300

[mcp]
; MCP server endpoint (empty = disabled)
; endpoint =
; Transport: http or stdio
; transport = http
; Timeout in seconds
; timeout_seconds = 30
; OAuth settings
; oauth_token_url =
; oauth_auth_url =
; oauth_redirect_url =
; oauth_client_id =
; oauth_client_secret =
; oauth_scopes =
; oauth_grant_type =
; oauth_callback_port = 9876

[gateway]
; Enable multi-platform gateway
enabled = false

[gateway.telegram]
; bot_token =
; allowed_users =

[gateway.discord]
; bot_token =
; allowed_users =

[gateway.slack]
; bot_token =
; app_token =
; allowed_users =

[ui-tui]
; ws_base = ws://127.0.0.1:8080/v1/chat/ws
; http_base = http://127.0.0.1:8080
; ws_read_timeout_seconds = 45
; ws_turn_timeout_seconds = 480
; ws_reconnect_max = 2
; history_max_lines = 2000
; event_max_items = 2000
; view_mode = human
; auto_doctor = true
