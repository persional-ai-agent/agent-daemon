name: contract-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Contract Regression Tests
        run: go test ./internal/api ./internal/cli ./ui-tui

      - name: Contract Replay
        run: |
          mkdir -p artifacts
          CONTRACT_REPLAY_REPORT="$PWD/artifacts/contract-replay.json" go test ./internal/api -run TestContractReplay -count=1

      - name: Contract Coverage Gate
        run: |
          mkdir -p artifacts
          go run ./scripts/contract_coverage \
            -openapi docs/api/ui-chat-contract.openapi.yaml \
            -replay internal/api/testdata/replay/cases.json \
            -report artifacts/contract-coverage.json \
            -enforce-core=true

      - name: Contract Diff (PR)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p artifacts
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git show "origin/${{ github.base_ref }}:docs/api/ui-chat-contract.openapi.yaml" > /tmp/base.openapi.yaml
          ACK_FILE=""
          if [ -f .contract/breaking-change-ack.md ]; then
            ACK_FILE=".contract/breaking-change-ack.md"
          fi
          if [ -n "$ACK_FILE" ]; then
            go run ./scripts/contract_diff.go -base /tmp/base.openapi.yaml -target docs/api/ui-chat-contract.openapi.yaml -ack "$ACK_FILE" -report artifacts/contract-diff.json
          else
            go run ./scripts/contract_diff.go -base /tmp/base.openapi.yaml -target docs/api/ui-chat-contract.openapi.yaml -report artifacts/contract-diff.json
          fi

      - name: Contract Diff (push baseline)
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p artifacts
          go run ./scripts/contract_diff.go -base docs/api/versions/v1/ui-chat-contract.openapi.yaml -target docs/api/ui-chat-contract.openapi.yaml -report artifacts/contract-diff.json

      - name: Upload Contract Diff Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-diff-report
          path: artifacts/contract-diff.json
          if-no-files-found: warn

      - name: Upload Contract Replay Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-replay-report
          path: artifacts/contract-replay.json
          if-no-files-found: warn

      - name: Upload Contract Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage-report
          path: artifacts/contract-coverage.json
          if-no-files-found: warn
