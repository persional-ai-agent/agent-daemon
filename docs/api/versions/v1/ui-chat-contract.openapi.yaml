openapi: 3.0.3
info:
  title: Agent Daemon UI/Chat Contract
  version: "v1"
  description: Machine-readable contract for /v1/ui/* and /v1/chat*.
servers:
  - url: http://127.0.0.1:8080
components:
  headers:
    XAgentUIApiVersion:
      description: Contract major version.
      schema:
        type: string
        example: v1
    XAgentUIApiCompat:
      description: Backward compatibility freeze date.
      schema:
        type: string
        example: "2026-05-13"
  schemas:
    ErrorBody:
      type: object
      required: [ok, api_version, compat, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        api_version:
          type: string
          enum: [v1]
        compat:
          type: string
          enum: ["2026-05-13"]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    UISuccessEnvelope:
      type: object
      required: [ok, api_version, compat]
      properties:
        ok:
          type: boolean
          enum: [true]
        api_version:
          type: string
          enum: [v1]
        compat:
          type: string
          enum: ["2026-05-13"]
paths:
  /v1/ui/tools:
    get:
      responses:
        "200":
          description: Tool list
          headers:
            X-Agent-UI-API-Version:
              $ref: "#/components/headers/XAgentUIApiVersion"
            X-Agent-UI-API-Compat:
              $ref: "#/components/headers/XAgentUIApiCompat"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, tools]
                    properties:
                      count:
                        type: integer
                      tools:
                        type: array
                        items:
                          type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/sessions:
    get:
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, sessions]
                    properties:
                      count:
                        type: integer
                      sessions:
                        type: array
                        items:
                          type: object
  /v1/ui/sessions/{session_id}:
    get:
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [session_id, messages, stats]
                    properties:
                      session_id:
                        type: string
                      messages:
                        type: array
                        items:
                          type: object
                      stats:
                        type: object
  /v1/ui/config:
    get:
      responses:
        "200":
          description: Config snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [snapshot]
                    properties:
                      snapshot:
                        type: object
  /v1/ui/config/set:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                value:
                  type: string
      responses:
        "200":
          description: Config update result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
  /v1/ui/gateway/status:
    get:
      responses:
        "200":
          description: Gateway status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [status]
                    properties:
                      status:
                        type: object
  /v1/ui/gateway/action:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [enable, disable]
      responses:
        "200":
          description: Gateway action result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
  /v1/ui/agents:
    get:
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
        - in: query
          name: session_id
          schema:
            type: string
      responses:
        "200":
          description: Delegate/subagent activity summary by session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, agents]
                    properties:
                      count:
                        type: integer
                      agents:
                        type: array
                        items:
                          type: object
                          required: [session_id, delegate_count]
                          properties:
                            session_id:
                              type: string
                            delegate_count:
                              type: integer
                            last_goal:
                              type: string
                            last_tool_call_id:
                              type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/agents/active:
    get:
      parameters:
        - in: query
          name: session_id
          schema:
            type: string
      responses:
        "200":
          description: Active delegate/subagent sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, active]
                    properties:
                      count:
                        type: integer
                      active:
                        type: array
                        items:
                          type: object
                          required: [session_id, running, started_at, duration_sec, delegate_count]
                          properties:
                            session_id:
                              type: string
                            running:
                              type: boolean
                            started_at:
                              type: string
                            duration_sec:
                              type: integer
                            delegate_count:
                              type: integer
                            last_goal:
                              type: string
                            last_tool_call_id:
                              type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/agents/detail:
    get:
      parameters:
        - in: query
          name: session_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delegate/subagent detail for one session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [session]
                    properties:
                      session:
                        type: object
                        required: [session_id, running, delegate_count]
                        properties:
                          session_id:
                            type: string
                          running:
                            type: boolean
                          delegate_count:
                            type: integer
                          last_goal:
                            type: string
                          last_tool_call_id:
                            type: string
                          goals:
                            type: array
                            items:
                              type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/agents/interrupt:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
      responses:
        "200":
          description: Interrupt active agent session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [session_id, interrupted, result]
                    properties:
                      session_id:
                        type: string
                      interrupted:
                        type: boolean
                        enum: [true]
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/agents/history:
    get:
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Delegate/subagent historical summary by session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, history]
                    properties:
                      count:
                        type: integer
                      history:
                        type: array
                        items:
                          type: object
                          required: [session_id, delegate_count]
                          properties:
                            session_id:
                              type: string
                            delegate_count:
                              type: integer
                            goals:
                              type: array
                              items:
                                type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills:
    get:
      responses:
        "200":
          description: Skills list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [count, skills]
                    properties:
                      count:
                        type: integer
                      skills:
                        type: array
                        items:
                          type: object
                          required: [name, path]
                          properties:
                            name:
                              type: string
                            path:
                              type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills/detail:
    get:
      parameters:
        - in: query
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Skill detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [skill]
                    properties:
                      skill:
                        type: object
                        required: [name, path, content]
                        properties:
                          name:
                            type: string
                          path:
                            type: string
                          content:
                            type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills/manage:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, name]
              properties:
                action:
                  type: string
                  enum: [create, edit, patch, delete]
                name:
                  type: string
                content:
                  type: string
                old_string:
                  type: string
                new_string:
                  type: string
                replace_all:
                  type: boolean
      responses:
        "200":
          description: Skill manage result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills/search:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                repo:
                  type: string
      responses:
        "200":
          description: Search remote skill catalog
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills/sync:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, source]
              properties:
                name:
                  type: string
                source:
                  type: string
                  enum: [url, github]
                url:
                  type: string
                repo:
                  type: string
                path:
                  type: string
      responses:
        "200":
          description: Sync/install skill from remote source
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/skills/reload:
    post:
      responses:
        "200":
          description: Skills reload result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/voice/status:
    get:
      responses:
        "200":
          description: Voice runtime status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [status]
                    properties:
                      status:
                        type: object
                        required: [enabled, recording, tts]
                        properties:
                          enabled:
                            type: boolean
                          recording:
                            type: boolean
                          tts:
                            type: boolean
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/voice/toggle:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [on, off, tts, status]
      responses:
        "200":
          description: Toggle voice mode / tts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/voice/record:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [start, stop]
      responses:
        "200":
          description: Start/stop voice recording
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/voice/tts:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Speak text with voice TTS
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/approval/confirm:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, approval_id, approve]
              properties:
                session_id:
                  type: string
                approval_id:
                  type: string
                approve:
                  type: boolean
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [result]
                    properties:
                      result:
                        type: object
  /v1/ui/complete/slash:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Slash completion
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [replace_from, items]
                    properties:
                      replace_from:
                        type: integer
                        minimum: 1
                      items:
                        type: array
                        items:
                          type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/ui/complete/path:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        "200":
          description: Path completion
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UISuccessEnvelope"
                  - type: object
                    required: [replace_from, items]
                    properties:
                      replace_from:
                        type: integer
                        minimum: 1
                      items:
                        type: array
                        items:
                          type: string
        "4XX":
          description: UI error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/chat:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                session_id:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Chat result with compatibility fields
          content:
            application/json:
              schema:
                type: object
                required: [ok, api_version, compat, result]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  api_version:
                    type: string
                    enum: [v1]
                  compat:
                    type: string
                    enum: ["2026-05-13"]
                  result:
                    type: object
                    required: [session_id, final_response, messages, turns_used, finished_naturally, summary]
                    properties:
                      session_id:
                        type: string
                      final_response:
                        type: string
                      messages:
                        type: array
                        items:
                          type: object
                      turns_used:
                        type: integer
                      finished_naturally:
                        type: boolean
                      summary:
                        type: object
                  session_id:
                    type: string
                  final_response:
                    type: string
                  messages:
                    type: array
                    items:
                      type: object
                  turns_used:
                    type: integer
                  finished_naturally:
                    type: boolean
                  summary:
                    type: object
        "4XX":
          description: Chat error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
  /v1/chat/cancel:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
      responses:
        "200":
          description: Cancel result with compatibility fields
          content:
            application/json:
              schema:
                type: object
                required: [ok, api_version, compat, result]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  api_version:
                    type: string
                    enum: [v1]
                  compat:
                    type: string
                    enum: ["2026-05-13"]
                  result:
                    type: object
                    required: [session_id, cancelled]
                    properties:
                      session_id:
                        type: string
                      cancelled:
                        type: boolean
                  session_id:
                    type: string
                  cancelled:
                    type: boolean
        "4XX":
          description: Cancel error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
